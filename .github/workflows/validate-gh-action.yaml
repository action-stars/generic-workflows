name: Validate GitHub Action

on:
  workflow_call:
    inputs:
      auto_doc:
        description: If auto-doc should be run.
        type: boolean
        required: false
        default: false
      shellcheck:
        description: If shellcheck should be run.
        type: boolean
        required: false
        default: false
      yamlfmt:
        description: If yamlfmt should be run.
        type: boolean
        required: false
        default: false
      rumdl:
        description: If rumdl should be run.
        type: boolean
        required: false
        default: false
      markdownlint:
        description: DEPRECATED - If markdownlint should be run.
        type: boolean
        required: false
        default: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup
        id: setup
        run: |
          set -euo pipefail

          if [[ -f "./action.yaml" ]]; then
            echo "action_file=./action.yaml" >> "${GITHUB_OUTPUT}"
          elif [[ -f "./action.yml" ]]; then
            echo "action_file=./action.yml" >> "${GITHUB_OUTPUT}"
          else
            echo "::Error::No action file found."
            exit 1
          fi

      - name: Install ghactl
        uses: action-stars/ghactl-action@c556c5f2cfcb1f6643bdecf1bf601c706954a37a # v0.0.1
        with:
          token: ${{ github.token }}
          version: latest

      - name: Install tools
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ghactl tool install --owner tj-actions --repo auto-doc --version latest
          ghactl tool install --owner google --repo yamlfmt --version latest

      - name: Run auto-doc check
        if: inputs.auto_doc
        run: |
          set -euo pipefail

          auto-doc --colMaxWords 100 --repository ${{ github.repository }} --filename "${{ steps.setup.outputs.action_file }}"
          if [[ -n "$(git status --porcelain --untracked-files=no)" ]]
          then
            echo "Documentation not up to date; please run auto-doc and commit changes!" >&2
            exit 1
          fi

      - name: Run yamlfmt check
        if: inputs.yamlfmt
        run: |
          set -euo pipefail

          yamlfmt -lint .

      - name: Run shellcheck
        if: inputs.shellcheck
        run: |
          set -euo pipefail

          # shellcheck disable=SC2038
          find . -type f -name "*.sh" | xargs --no-run-if-empty -n1 shellcheck

      - name: Run markdownlint check
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        if: inputs.markdownlint
